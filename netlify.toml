[build]
    command = "npm install && npm run build"
    publish = "dist"
    functions = "netlify/functions"

  [build.environment]
    NODE_VERSION = "20"

  # ── Scheduled function: processa fila de emails de recuperação ────────────
  # Roda a cada 15 minutos para verificar emails pendentes (sequência 2/3 e 3/3)
  [functions."process-recovery-queue"]
    schedule = "*/15 * * * *"

  [[redirects]]
    from = "/api/pix/create"
    to = "/.netlify/functions/pix-create"
    status = 200
    force = true

  [[redirects]]
    from = "/api/pix/status"
    to = "/.netlify/functions/pix-status"
    status = 200
    force = true

  [[redirects]]
    from = "/*"
    to = "/index.html"
    status = 200
